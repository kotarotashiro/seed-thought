<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>SeedThought Clipper 設定</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic Pro", Meiryo, sans-serif;
        max-width: 520px;
        margin: 32px auto;
        padding: 0 20px;
        color: #1f2937;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 4px;
      }
      .lead {
        color: #6b7280;
        font-size: 13px;
        margin-bottom: 24px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #1f2937;
        margin-top: 16px;
        margin-bottom: 6px;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 13px;
        box-sizing: border-box;
      }
      .help {
        font-size: 11px;
        color: #6b7280;
        margin-top: 6px;
      }
      button.save {
        margin-top: 20px;
        padding: 10px 18px;
        background: #16a34a;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      button.save:hover {
        background: #15803d;
      }
      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <h1>SeedThought Clipper 設定</h1>
    <p class="lead">送信先のSeedThoughtインスタンスを指定します。</p>

    <label for="endpoint">SeedThoughtのURL</label>
    <input type="text" id="endpoint" placeholder="http://localhost:3003 または https://your-app.vercel.app" />
    <p class="help">末尾のスラッシュは自動で削除されます。</p>

    <label for="token">拡張トークン（任意）</label>
    <input type="password" id="token" placeholder="サーバ側でEXTENSION_TOKENを設定している場合のみ" />
    <p class="help">サーバの環境変数 EXTENSION_TOKEN が空ならこの欄も空でOKです。</p>

    <button class="save" id="save">保存</button>
    <div class="status" id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
