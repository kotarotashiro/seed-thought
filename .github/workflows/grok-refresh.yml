name: Keep Grok OAuth warm

# Vercel Hobby の cron は 1日1回までしか動かせないため、Grok の refresh_token を
# 無活動失効から守る目的で GitHub Actions から定期的に /api/cron/grok-refresh を叩く。
# これにより認証チェーンが温まり続け、再接続が必要になる頻度を大きく下げる。

on:
  schedule:
    # 毎時17分（UTC基準）。毎時0分の混雑による大幅遅延を避ける。
    - cron: "17 * * * *"
  workflow_dispatch: {} # 手動実行も可能

permissions:
  contents: read

concurrency:
  group: grok-oauth-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping grok-refresh
        run: |
          curl --fail-with-body --silent --show-error --retry 3 --retry-delay 5 \
            --max-time 30 -X GET "${{ secrets.APP_BASE_URL }}/api/cron/grok-refresh" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            && echo "grok-refresh ok"
